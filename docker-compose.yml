# FishList API + MinIO for local image/upload testing.
# Usage: docker compose up --build
#   - API:            http://localhost:8080
#   - MinIO S3 API:   http://localhost:9000
#   - MinIO Console:  http://localhost:9001  (login minioadmin / minioadmin)
#
# Optional Supabase Postgres: set in .env (see .env.example):
#   SPRING_PROFILES_ACTIVE=docker,supabase
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
#
# Optional Supabase Storage (S3): in .env set MINIO_ENDPOINT, keys, MINIO_PATH_STYLE=true, MINIO_REGION
# (see .env.example). Create the bucket in the Supabase dashboard; endpoint must include /storage/v1/s3.

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/fishlist --ignore-existing
    restart: "no"

  fishlist:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      MINIO_ENABLED: "true"
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-fishlist}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PATH_STYLE: ${MINIO_PATH_STYLE:-false}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      # Optional: block specific names without granting admin (Spring: APP_ADMIN_RESERVED_USERNAMES_0)
      APP_ADMIN_RESERVED_USERNAMES_0: ${APP_ADMIN_RESERVED_USERNAMES_0:-}
      JWT_SECRET: ${JWT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      OPENAI_IDENTIFY_DAILY_LIMIT: ${OPENAI_IDENTIFY_DAILY_LIMIT:-2}
      IMAGE_UPLOAD_DAILY_LIMIT: ${IMAGE_UPLOAD_DAILY_LIMIT:-15}
      RATE_LIMIT_FEED_PER_MINUTE: ${RATE_LIMIT_FEED_PER_MINUTE:-60}
      RATE_LIMIT_SEARCH_PER_MINUTE: ${RATE_LIMIT_SEARCH_PER_MINUTE:-40}
      RATE_LIMIT_STORAGE_DOWNLOAD_URL_PER_MINUTE: ${RATE_LIMIT_STORAGE_DOWNLOAD_URL_PER_MINUTE:-60}
      RATE_LIMIT_LOCATION_WRITES_PER_MINUTE: ${RATE_LIMIT_LOCATION_WRITES_PER_MINUTE:-45}
      RATE_LIMIT_INTERACTIONS_PER_MINUTE: ${RATE_LIMIT_INTERACTIONS_PER_MINUTE:-120}
      # Align with application.properties (25MB default); override with MULTIPART_MAX_SIZE for huge RAW/heic.
      MULTIPART_MAX_SIZE: ${MULTIPART_MAX_SIZE:-25MB}
    depends_on:
      minio-init:
        condition: service_completed_successfully

volumes:
  minio-data:
