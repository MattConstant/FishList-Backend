name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "FishList/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "FishList/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FishList

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Verify backend
        run: ./mvnw -B verify
