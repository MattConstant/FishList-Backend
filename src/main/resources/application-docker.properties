# Active when SPRING_PROFILES_ACTIVE=docker (see docker-compose.yml).

minio.enabled=true
minio.endpoint=${MINIO_ENDPOINT:http://minio:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:fishlist}
minio.public-base-url=${MINIO_PUBLIC_BASE_URL:http://localhost:9000}
