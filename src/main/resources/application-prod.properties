# Active when SPRING_PROFILES_ACTIVE includes "prod" (e.g. Render).
# Keeps docs and dev consoles off to reduce surface area and avoid extra work per request.

# OpenAPI / Swagger UI — disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# H2 web console should never be exposed in production (Postgres etc. use other profiles)
spring.h2.console.enabled=false

# Avoid logging every SQL statement in production
spring.jpa.show-sql=false
