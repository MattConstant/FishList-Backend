# Active when SPRING_PROFILES_ACTIVE includes "prod" (e.g. Render).
# Keeps docs and dev consoles off to reduce surface area and avoid extra work per request.

# OpenAPI / Swagger UI — disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# H2 web console should never be exposed in production (Postgres etc. use other profiles)
spring.h2.console.enabled=false

# Avoid logging every SQL statement in production
spring.jpa.show-sql=false

# Startup on small hosts (e.g. Render 512 MB / 0.1 CPU): defer non-web beans until first use so
# the server listens sooner. First real API request may pay one-time init cost.
spring.main.lazy-initialization=true

# Minor savings on tiny JVMs
spring.jmx.enabled=false

# Less log I/O during boot
logging.level.org.springframework=warn
logging.level.org.hibernate=warn
logging.level.org.apache.catalina=warn
