# External Supabase/Postgres: apply safe schema SQL before Hibernate ddl-auto=update.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/account-email-verification-init.sql

# Supabase Session pooler (port 5432) shares ~20 connections across every client (Render, local Docker, etc.).
# Spring Boot defaults to 10 per JVM — that alone can exhaust the pool during deploy overlap.
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
