# Active when Spring profile "supabase" is included (e.g. SPRING_PROFILES_ACTIVE=supabase
# or SPRING_PROFILES_ACTIVE=docker,supabase with Docker Compose + MinIO).
#
# Provide credentials only via environment (or K8s Secret), never in this file:
#   SPRING_DATASOURCE_URL
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
#
# Example URL (direct or session pooler, port 5432): use sslmode=require
#   jdbc:postgresql://db.YOUR_REF.supabase.co:5432/postgres?sslmode=require
#
# If you see "MaxClientsInSessionMode: max clients reached", Supavisor Session mode limits
# concurrent connections. This profile caps the Hikari pool (see below). Optionally lower
# HIKARI_MAXIMUM_POOL_SIZE (e.g. 2) or use the Transaction pooler on port 6543 for more clients
# (different JDBC URL; may need extra Hibernate flags — see Supabase pooler docs).

spring.h2.console.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari — Supabase Session pooler allows only a small number of concurrent server connections.
# Default Spring/Hikari (10) often exceeds that and triggers MaxClientsInSessionMode.
spring.datasource.hikari.pool-name=fishlist
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:4}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1700000
spring.datasource.hikari.connection-timeout=30000

# Avoid JDBC session schema init before JPA; this app uses HTTP Basic without shared server sessions.
spring.session.store-type=none
spring.autoconfigure.exclude=org.springframework.boot.session.jdbc.autoconfigure.JdbcSessionAutoConfiguration

spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.platform=postgresql
