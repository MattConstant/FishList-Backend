spring.application.name=FishList

# CORS — Next.js dev server (fishlist-frontend) and other local frontends
app.cors.allowed-origin-patterns[0]=http://localhost:3000
app.cors.allowed-origin-patterns[1]=http://127.0.0.1:3000
app.cors.allowed-origin-patterns[2]=http://localhost:5173
app.cors.allow-credentials=false
app.cors.max-age-seconds=3600

# MinIO (S3) — enable when a server is reachable (e.g. docker compose minio on localhost:9000)
minio.enabled=false
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=fishlist
# Browser-facing base URL for presigned links when the app uses a different host than clients (Docker)
minio.public-base-url=http://localhost:9000

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.jpa.show-sql=true
# Use H2 for development, NOT for production
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.jpa.database=h2
spring.sql.init.platform=h2
