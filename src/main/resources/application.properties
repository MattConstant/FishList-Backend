spring.application.name=FishList

# Production: set SPRING_PROFILES_ACTIVE=prod on the host (optionally prod,supabase) — see application-prod.properties

# CORS — browser origins allowed to call this API (see CorsProperties).
# Local dev + production Vercel. To add more origins on Render without rebuilding, use Spring Boot
# env vars (same property, relaxed binding), e.g. APP_CORS_ALLOWED_ORIGIN_PATTERNS_0=...
# or edit this file and redeploy.
app.cors.allowed-origin-patterns[0]=http://localhost:3000
app.cors.allowed-origin-patterns[1]=http://127.0.0.1:3000
app.cors.allowed-origin-patterns[2]=http://localhost:5173
app.cors.allowed-origin-patterns[3]=https://fish-list-frontend.vercel.app
app.cors.allow-credentials=false
app.cors.max-age-seconds=3600

# Comma-separated admin usernames (e.g. app.admin.usernames[0]=MattConstant)
app.admin.usernames[0]=${ADMIN_USERNAME:}

# FishList API JWT (Bearer) — at least 32 characters; set JWT_SECRET in production
app.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef}
app.jwt.expiration-seconds=86400
# Google OAuth Web client ID (must match NEXT_PUBLIC_GOOGLE_CLIENT_ID on the frontend)
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}

# MinIO (S3) — enable when a server is reachable (e.g. docker compose minio on localhost:9000)
minio.enabled=false
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=fishlist
# Browser-facing base URL for presigned links when the app uses a different host than clients (Docker)
minio.public-base-url=http://localhost:9000
# Supabase Storage S3: set region + path-style from dashboard (Storage → S3 connection)
minio.region=us-east-1
minio.path-style=false

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.jpa.show-sql=true
# Use H2 for development, NOT for production
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.jpa.database=h2
spring.sql.init.platform=h2
spring.jpa.hibernate.ddl-auto=update

# OpenAI (disabled by default). Set OPENAI_ENABLED=true and OPENAI_API_KEY to enable fish identification.
openai.enabled=${OPENAI_ENABLED:false}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.api-key=${OPENAI_API_KEY:}
openai.identify.daily-limit=${OPENAI_IDENTIFY_DAILY_LIMIT:2}

# Daily per-user upload cap (new-app budget guard)
image.upload.daily-limit=${IMAGE_UPLOAD_DAILY_LIMIT:15}

# General API throttling (per user/IP per minute)
rate-limit.feed.per-minute=${RATE_LIMIT_FEED_PER_MINUTE:60}
rate-limit.search.per-minute=${RATE_LIMIT_SEARCH_PER_MINUTE:40}
rate-limit.storage-download-url.per-minute=${RATE_LIMIT_STORAGE_DOWNLOAD_URL_PER_MINUTE:60}
rate-limit.location-writes.per-minute=${RATE_LIMIT_LOCATION_WRITES_PER_MINUTE:45}
rate-limit.interactions.per-minute=${RATE_LIMIT_INTERACTIONS_PER_MINUTE:120}
