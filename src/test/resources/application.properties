# Test context: JWT + Google client id required for SecurityConfig beans
app.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef
app.jwt.expiration-seconds=3600
app.oauth2.google.client-id=test-google-client-id
app.cors.allowed-origin-patterns[0]=http://localhost:3000
app.cors.allow-credentials=false

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.jpa.database=h2
spring.jpa.hibernate.ddl-auto=create-drop
